<form #loginForm="ngForm" (ngSubmit)="submit(loginForm)">
    <h1>User Login</h1>
    <div class="login-form">
        <label for="username">User Name</label><br>
        <input type="text" name="username" id="username" placeholder="Enter the User name" required
            [(ngModel)]="loginuser.username" #username="ngModel"><br>
        <div *ngIf="username.invalid && username.touched" class="errM">
            username is invalid
        </div>
        <label for="password">Password</label><br>
        <input type="password" name="password" id="password" placeholder="Enter the password" required minlength="6"
            [(ngModel)]="loginuser.password" #password="ngModel"><br>
        <div *ngIf="password.invalid && password.touched" class="errM">
            password is invalid
        </div>
    </div>
    <div class="btn">
        <button type="submit" class="login-btn">Login</button>
        <button type="button" (click)="goToRegister()" class="register-btn">Not a User? Register</button>
    </div>

    <div *ngIf="errorMessage" style="color: red;" class="errM">{{errorMessage}}</div>
</form>
